spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/OnlineSchool?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:

      ddl-auto: update
    naming:
      physical-strategy: org.springframework.boot.autoconfigure.orm.jpa.CamelCaseToUnderscoresNamingStrategy
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

server:
  port: 8080
  error:
    include-stacktrace: never

application:
  jwt:
    tokenPrefix: "Bearer"
    tokenExpirationAfterDays: 7
    secretKey: ${JWT_SECRET_KEY:asdasdasdasdasd123344asdasdasdasdasasd12321332sadasXYZ0123456789ABCDEF}

